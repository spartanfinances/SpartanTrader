<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Pro-Trader — Control de negocio de Trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-grad-a:#E8F5F0; --bg-grad-b:#ECE9F8; --bg-dark:#11151B;
    --surface:#FFFFFF; --surface-2:#F6F8F9; --border:#E3E7EC;
    --text:#1B2230; --text-muted:#6B7686;
    --accent-progress:#F4A261; --accent-pass:#3DBA8B; --accent-block:#E0654B; --accent-info:#6C8EBF;
    --radius:12px;
    --display:'Space Grotesk', sans-serif; --body-font:'Inter', system-ui, -apple-system, sans-serif; --mono:'JetBrains Mono','SF Mono', monospace;
    --shadow: 0 1px 2px rgba(20,30,40,0.04), 0 4px 14px rgba(20,30,40,0.05);
  }
  body.theme-dark{
    --surface:#1B212B; --surface-2:#222933; --border:#2B323E;
    --text:#E8EAED; --text-muted:#8C94A3;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: linear-gradient(135deg, var(--bg-grad-a), var(--bg-grad-b));
    background-attachment: fixed;
    color:var(--text); font-family:var(--body-font); -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  body.theme-dark{
    background: var(--bg-dark);
    background-image:repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 28px);
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
  .wrap{ max-width:1180px; margin:0 auto; padding:18px 16px 60px; }
  .loading{ padding:60px 0; text-align:center; color:var(--text-muted); font-family:var(--mono); font-size:13px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{ font-family:var(--display); font-weight:700; font-size:16px; letter-spacing:-0.02em; color:#0E1A16;
    background:linear-gradient(135deg, #4FCFA0 0%, var(--accent-pass) 45%, var(--accent-progress) 100%);
    border-radius:10px; width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    line-height:1; flex-shrink:0; box-shadow:0 2px 6px rgba(61,186,139,0.35), inset 0 1px 0 rgba(255,255,255,0.25); }
  .brand-text h1{ font-family:var(--display); font-size:19px; font-weight:600; margin:0; letter-spacing:-0.01em; }
  .brand-text .subtitle{ display:block; font-size:11.5px; color:var(--text-muted); margin-top:2px; }
  .header-actions{ display:flex; gap:8px; }
  .btn-ghost{ background:transparent; border:1px solid var(--border); color:var(--text-muted); font-family:var(--body-font);
    font-size:12px; font-weight:600; padding:9px 13px; border-radius:8px; cursor:pointer; transition:border-color .15s, color .15s; }
  .btn-ghost:hover{ border-color:var(--accent-pass); color:var(--accent-pass); }
  .btn-ghost.danger:hover{ border-color:var(--accent-block); color:var(--accent-block); }
  .btn-ghost.small{ padding:6px 10px; font-size:11.5px; }
  .btn-primary{ background:linear-gradient(135deg, var(--accent-pass), #3a9c8c); border:none; color:#0c1410; font-weight:700;
    font-size:12.5px; padding:9px 14px; border-radius:8px; cursor:pointer; }
  .btn-primary:hover{ filter:brightness(1.08); }

  .dashboard-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:10px; margin-bottom:22px; }
  .stat-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:13px 14px; display:flex; flex-direction:column; gap:4px; box-shadow:var(--shadow); }
  .stat-label{ font-size:10.5px; color:var(--text-muted); font-weight:600; letter-spacing:.02em; text-transform:uppercase; }
  .stat-value{ font-family:var(--mono); font-size:19px; font-weight:600; }
  .stat-value.pos{ color:var(--accent-pass); } .stat-value.neg{ color:var(--accent-block); }
  .stat-sub{ font-size:10.5px; color:var(--text-muted); }

  .panel{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:18px; box-shadow:var(--shadow); }
  .panel-title{ font-family:var(--display); font-size:16px; font-weight:600; margin:0 0 12px; }
  .table-wrap{ overflow-x:auto; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{ text-align:left; font-size:10.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.03em;
    padding:6px 10px; border-bottom:1px solid var(--border); }
  tbody td{ padding:9px 10px; border-bottom:1px solid var(--border); }
  tbody tr:last-child td{ border-bottom:none; }
  .empty-cell{ color:var(--text-muted); font-size:12.5px; padding:18px 4px; text-align:center; }
  .mono{ font-family:var(--mono); } .pos{ color:var(--accent-pass); } .neg{ color:var(--accent-block); }

  .filters{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .select-filter{ background:var(--surface-2); border:1px solid var(--border); color:var(--text); font-family:var(--body-font);
    font-size:12px; padding:8px 10px; border-radius:7px; }

  .cuentas-list{ display:flex; flex-direction:column; gap:10px; }
  .cuenta-card{ background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .cuenta-summary{ display:flex; align-items:center; gap:14px; padding:12px 14px; flex-wrap:wrap; }
  .cuenta-id{ display:flex; flex-direction:column; gap:2px; min-width:160px; flex:1; }
  .cuenta-nombre{ font-weight:600; font-size:13.5px; }
  .cuenta-meta{ font-size:11px; color:var(--text-muted); }
  .cuenta-nums{ display:flex; gap:16px; flex-wrap:wrap; }
  .cuenta-nums > div{ display:flex; flex-direction:column; gap:1px; }
  .num-label{ font-size:9.5px; color:var(--text-muted); text-transform:uppercase; }
  .badge{ font-family:var(--mono); font-size:10px; font-weight:600; padding:3px 9px; border-radius:20px; white-space:nowrap; }
  .badge-pass{ background:rgba(79,184,166,.18); color:var(--accent-pass); }
  .badge-pass2{ background:rgba(108,142,191,.2); color:#9DBBE2; }
  .badge-warn{ background:rgba(217,142,74,.18); color:var(--accent-progress); }
  .badge-block{ background:rgba(217,83,79,.18); color:var(--accent-block); }

  .cuenta-detalle{ border-top:1px solid var(--border); padding:14px; }
  .detalle-cols{ display:grid; grid-template-columns:1.2fr 1fr; gap:18px; }
  @media (max-width:720px){ .detalle-cols{ grid-template-columns:1fr; } }
  .detalle-subtitle{ font-size:12.5px; font-weight:700; margin:0 0 8px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.03em; }
  .mov-list{ display:flex; flex-direction:column; gap:6px; max-height:220px; overflow-y:auto; margin-bottom:10px; }

    background:linear-gradient(135deg,#3DBA8B,#D98E4A);border-radius:12px;padding:12px 20px;

<body>
<div class="wrap" id="app">
  <div class="loading">Cargando…</div>
</div>
<script>
// ============================================================
// GAUGES SVG (dial semicircular tipo Win Rate, anillo tipo Profit Factor)
// ============================================================
function polarToCartesian(cx, cy, r, angleDeg){
  var rad = angleDeg * Math.PI / 180.0;
  return { x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad) };
}

function describeArc(cx, cy, r, startAngle, endAngle){
  var start = polarToCartesian(cx, cy, r, startAngle);
  var end = polarToCartesian(cx, cy, r, endAngle);
  var largeArcFlag = (endAngle - startAngle) <= 180 ? "0" : "1";
  return ["M", start.x.toFixed(2), start.y.toFixed(2), "A", r, r, 0, largeArcFlag, 1, end.x.toFixed(2), end.y.toFixed(2)].join(" ");
}

// Dial semicircular: de -180 (izquierda) a 0 (derecha), pasando por -90 (arriba)
function dialGaugeSVG(fraction, opts){
  opts = opts || {};
  fraction = Math.max(0, Math.min(1, isNaN(fraction) ? 0 : fraction));
  var cx = 70, cy = 70, r = 55, sw = 11;
  var segs = [[-180,-120,'#E0654B'], [-120,-60,'#F4A261'], [-60,0,'#3DBA8B']];
  var arcs = segs.map(function(s){
    return '<path d="' + describeArc(cx, cy, r, s[0], s[1]) + '" stroke="' + s[2] + '" stroke-width="' + sw + '" fill="none" stroke-linecap="round" opacity="0.85"/>';
  }).join('');
  var needleAngle = -180 + fraction*180;
  var tip = polarToCartesian(cx, cy, r-18, needleAngle);
  var needle = '<line x1="' + cx + '" y1="' + cy + '" x2="' + tip.x.toFixed(2) + '" y2="' + tip.y.toFixed(2) + '" stroke="' + (opts.needleColor||'#1B2230') + '" stroke-width="3" stroke-linecap="round"/>' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="5" fill="' + (opts.needleColor||'#1B2230') + '"/>';
  return '<svg viewBox="0 0 140 80" class="gauge-svg">' + arcs + needle + '</svg>';
}

// Anillo circular: de -90 (arriba) en sentido horario, proporcional a fraction (0 a 1)
function ringGaugeSVG(fraction, opts){
  opts = opts || {};
  fraction = Math.max(0, Math.min(1, isNaN(fraction) ? 0 : fraction));
  var cx = 70, cy = 45, r = 38, sw = 9;
  var bg = '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" stroke="' + (opts.bgColor||'var(--border)') + '" stroke-width="' + sw + '" fill="none"/>';
  var fg = '';
  if(fraction > 0.001){
    var endAngle = -90 + fraction*359.999; // evitar arco completo degenerado en 360
    fg = '<path d="' + describeArc(cx, cy, r, -90, endAngle) + '" stroke="' + (opts.color||'#3DBA8B') + '" stroke-width="' + sw + '" fill="none" stroke-linecap="round"/>';
  }
  return '<svg viewBox="0 0 140 90" class="gauge-svg">' + bg + fg + '</svg>';
}

function gaugeCard(title, svg, value, sub, footLeft, footRight){
  return '<div class="gauge-card">' +
    '<span class="gauge-title">' + title + '</span>' +
    '<div class="gauge-svg-wrap">' + svg + '<div class="gauge-center-text"><span class="gauge-value">' + value + '</span>' + (sub?('<span class="gauge-sub">'+sub+'</span>'):'') + '</div></div>' +
    (footLeft!==undefined ? ('<div class="gauge-foot"><span>'+footLeft+'</span><span>'+footRight+'</span></div>') : '') +
  '</div>';
}


// ============================================================
// CALENDARIO — agregación de P&L diario (Futuros + Opciones)
// ============================================================
var MES_NOMBRES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
var DIA_NOMBRES = ["Sáb","Dom","Lun","Mar","Mié","Jue","Vie"];
var calState = { mode: 'month', year: new Date().getFullYear(), month: new Date().getMonth() };

function dailyCapitalMap(){
  var map = {};
  // Futuros: lo que cuenta como capital real es el payout NETO de las empresas de fondeo
  // (ganancias registradas en la cuenta menos gastos: compras, resets, comisiones), NO el
  // P&L de las operaciones — ese es desempeño técnico, no efectivo disponible.
  cuentas.forEach(function(c){
    (c.ganancias||[]).forEach(function(g){ map[g.fecha] = (map[g.fecha]||0) + (Number(g.monto)||0); });
    (c.gastos||[]).forEach(function(g){ map[g.fecha] = (map[g.fecha]||0) - (Number(g.monto)||0); });
  });
  // Opciones: capital propio real, el P&L de cada trade sí es efectivo directo.
  opciones.forEach(function(o){ var d = (o.fechaHora||'').slice(0,10); if(d) map[d] = (map[d]||0) + o.pnlBruto; });
  return map;
}

function dailyPnlMap(fuente){
  var map = {};
  if(fuente !== 'opciones'){
    operaciones.forEach(function(o){ map[o.fecha] = (map[o.fecha]||0) + o.pnl; });
  }
  if(fuente !== 'futuros'){
    opciones.forEach(function(o){ var d = (o.fechaHora||'').slice(0,10); if(d) map[d] = (map[d]||0) + o.pnlBruto; });
  }
  return map;
}

function pad2(n){ return n<10 ? '0'+n : ''+n; }

function buildMonthGrid(year, month, pnlMap){
  var firstDay = new Date(year, month, 1);
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var startOffset = (firstDay.getDay() + 1) % 7; // 0 = sábado (semana de futuros: Sáb-Vie)
  var cells = [];
  for(var i=0;i<startOffset;i++) cells.push(null);
  for(var d=1; d<=daysInMonth; d++){
    var dateStr = year + '-' + pad2(month+1) + '-' + pad2(d);
    cells.push({ day:d, dateStr:dateStr, pnl: pnlMap[dateStr] || 0, hasData: pnlMap.hasOwnProperty(dateStr) });
  }
  while(cells.length % 7 !== 0) cells.push(null);
  var weeks = [];
  for(var w=0; w<cells.length; w+=7) weeks.push(cells.slice(w, w+7));
  return weeks;
}

function renderCalendarioTab(c){
  var pnlMap = dailyPnlMap();
  c.innerHTML = '<div class="panel">' +
    '<h2 class="panel-title">Calendario</h2>' +
    '<div class="cal-controls">' +
      '<button type="button" class="cal-nav-btn" id="calPrev">‹</button>' +
      '<span class="cal-label" id="calLabel"></span>' +
      '<button type="button" class="cal-nav-btn" id="calNext">›</button>' +
      '<div class="pill-group">' +
        ['year','month','week'].map(function(m){ return '<button type="button" class="pill-btn' + (calState.mode===m?' pill-active':'') + '" data-mode="' + m + '">' + (m==='year'?'Año':m==='month'?'Mes':'Semana') + '</button>'; }).join('') +
      '</div>' +
    '</div>' +
    '<div id="calBody"></div>' +
  '</div>';

  document.getElementById('calPrev').onclick = function(){ calNav(-1); };
  document.getElementById('calNext').onclick = function(){ calNav(1); };
  document.querySelectorAll('.pill-btn').forEach(function(b){
    b.onclick = function(){ calState.mode = b.dataset.mode; renderCalendarioTab(document.getElementById('tabContent')); };
  });
  renderCalBody(pnlMap);
}

function calNav(dir){
  if(calState.mode === 'year'){ calState.year += dir; }
  else if(calState.mode === 'month'){
    calState.month += dir;
    if(calState.month<0){ calState.month=11; calState.year--; }
    if(calState.month>11){ calState.month=0; calState.year++; }
  } else {
    // semana: navegamos por la fecha de referencia guardada en calState.weekRef (timestamp)
    var ref = calState.weekRef ? new Date(calState.weekRef) : new Date();
    ref.setDate(ref.getDate() + dir*7);
    calState.weekRef = ref.getTime();
  }
  renderCalendarioTab(document.getElementById('tabContent'));
}

function renderCalBody(pnlMap){
  var label = document.getElementById('calLabel');
  var body = document.getElementById('calBody');
  if(calState.mode === 'year'){
    label.textContent = String(calState.year);
    var html = '<div class="cal-grid year-grid">';
    var totalYear = 0;
    for(var m=0; m<12; m++){
      var sum = 0;
      Object.keys(pnlMap).forEach(function(d){
        var parts = d.split('-');
        if(parseInt(parts[0],10)===calState.year && parseInt(parts[1],10)===m+1) sum += pnlMap[d];
      });
      totalYear += sum;
      html += '<div class="cal-month-cell"><span class="cal-month-name">' + MES_NOMBRES[m] + '</span>' +
        '<span class="cal-month-val mono ' + (sum>0?'pos':sum<0?'neg':'') + '">' + fmt(sum) + '</span></div>';
    }
    html += '<div class="cal-month-cell" style="border-color:var(--accent-progress);"><span class="cal-month-name">Total</span>' +
      '<span class="cal-month-val mono ' + (totalYear>0?'pos':totalYear<0?'neg':'') + '">' + fmt(totalYear) + '</span></div>';
    html += '</div>';
    body.innerHTML = html;
  } else if(calState.mode === 'month'){
    label.textContent = MES_NOMBRES[calState.month] + ' ' + calState.year;
    var weeks = buildMonthGrid(calState.year, calState.month, pnlMap);
    var monthTotal = 0;
    weeks.forEach(function(week){ week.forEach(function(cell){ if(cell) monthTotal += cell.pnl; }); });
    var html = '<div class="cal-grid">' + DIA_NOMBRES.map(function(d){ return '<div class="cal-daylabel">'+d+'</div>'; }).join('') + '<div class="cal-daylabel">Total</div></div>';
    weeks.forEach(function(week, idx){
      html += '<div class="cal-grid" style="margin-top:6px;">';
      var weekTotal = 0;
      week.forEach(function(cell){
        if(!cell){ html += '<div class="cal-cell empty"></div>'; return; }
        weekTotal += cell.pnl;
        var cls = cell.pnl>0?'pos':cell.pnl<0?'neg':'';
        html += '<div class="cal-cell ' + cls + '"><span class="cal-daynum">' + cell.day + '</span>' + (cell.hasData?('<span class="cal-pnl mono ' + cls + '">'+fmt(cell.pnl)+'</span>'):'') + '</div>';
      });
      html += '<div class="cal-week-total">' + fmt(weekTotal) + '</div>';
      if(idx === weeks.length - 1){
        var mcls = monthTotal>0?'pos':monthTotal<0?'neg':'';
        html += '<div class="cal-week-total cal-month-total-cell">P&L Mes<br><span class="mono ' + mcls + '">' + fmt(monthTotal) + '</span></div>';
      }
      html += '</div>';
    });
    body.innerHTML = html;
  } else {
    var ref = calState.weekRef ? new Date(calState.weekRef) : new Date();
    var dow = (ref.getDay()+1)%7; // 0 = sábado
    var monday = new Date(ref); monday.setDate(ref.getDate()-dow);
    label.textContent = 'Semana del ' + monday.getDate() + ' ' + MES_NOMBRES[monday.getMonth()];
    var html = '<div class="cal-grid">';
    var weekTotal = 0;
    for(var i=0;i<7;i++){
      var d2 = new Date(monday); d2.setDate(monday.getDate()+i);
      var dateStr = d2.getFullYear() + '-' + pad2(d2.getMonth()+1) + '-' + pad2(d2.getDate());
      var pnl = pnlMap[dateStr] || 0;
      weekTotal += pnl;
      var cls = pnl>0?'pos':pnl<0?'neg':'';
      html += '<div class="cal-cell ' + cls + '"><span class="cal-daynum">' + DIA_NOMBRES[i] + ' ' + d2.getDate() + '</span>' +
        (pnlMap.hasOwnProperty(dateStr)?('<span class="cal-pnl mono ' + cls + '">'+fmt(pnl)+'</span>'):'<span class="cal-pnl mono">—</span>') + '</div>';
    }
    html += '<div class="cal-week-total">' + fmt(weekTotal) + '</div></div>';
    body.innerHTML = html;
  }
}

function sum(arr){ return arr.reduce(function(a,b){ return a + (Number(b.monto)||0); }, 0); }

function statsCuenta(c){
  var gastos = sum(c.gastos||[]);
  var ganancias = sum(c.ganancias||[]);
  var beneficio = ganancias - gastos;
  var roi = gastos > 0 ? (beneficio/gastos) : null;
  return { gastos: gastos, ganancias: ganancias, beneficio: beneficio, roi: roi };
}

function statsGlobal(lista){
  var evaluaciones = lista.filter(function(c){ return c.tipo === "Evaluación"; }).length;
  var live = lista.filter(function(c){ return c.tipo === "Live" || c.tipo === "XFA / Fondeada"; }).length;
  var pasadas = lista.filter(function(c){ return c.estado === "Pasada"; }).length;
  var gastos = 0, ganancias = 0;
  lista.forEach(function(c){ var s = statsCuenta(c); gastos += s.gastos; ganancias += s.ganancias; });
  var beneficio = ganancias - gastos;
  var roi = gastos > 0 ? (beneficio/gastos) : null;
  var fundingRatio = evaluaciones > 0 ? (pasadas/evaluaciones) : null;
  return { evaluaciones: evaluaciones, live: live, gastos: gastos, ganancias: ganancias, beneficio: beneficio, roi: roi, fundingRatio: fundingRatio };
}

function statsPorEmpresa(lista){
  var map = {};
  lista.forEach(function(c){
    if(!map[c.empresa]) map[c.empresa] = { empresa: c.empresa, cuentas: 0, gastos: 0, ganancias: 0 };
    var s = statsCuenta(c);
    map[c.empresa].cuentas += 1;
    map[c.empresa].gastos += s.gastos;
    map[c.empresa].ganancias += s.ganancias;
  });
  return Object.keys(map).map(function(k){
    var e = map[k];
    e.beneficio = e.ganancias - e.gastos;
    e.roi = e.gastos > 0 ? (e.beneficio/e.gastos) : null;
    return e;
  }).sort(function(a,b){ return (b.roi||-Infinity) - (a.roi||-Infinity); });
}

function fmt(n){
  if(n === null || n === undefined || isNaN(n)) return "—";
  var s = n < 0 ? "-$" : "$";
  return s + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function fmtPct(n){
  if(n === null || n === undefined || isNaN(n)) return "—";
  return (n*100).toFixed(1) + "%";
}

function statsOperaciones(lista){
  var ordenadas = lista.slice().sort(function(a,b){ return a.fecha < b.fecha ? -1 : 1; });
  var ganadoras = ordenadas.filter(function(o){ return o.resultado === "TP" || o.resultado === "TP 1:1"; });
  var perdedoras = ordenadas.filter(function(o){ return o.resultado === "SL"; });
  var be = ordenadas.filter(function(o){ return o.resultado === "BE"; });
  var total = ordenadas.length;
  var winrate = (ganadoras.length + perdedoras.length) > 0 ? ganadoras.length / (ganadoras.length + perdedoras.length) : null;
  var pnlNeto = ordenadas.reduce(function(a,o){ return a + o.pnl; }, 0);
  var gananciaBruta = ganadoras.reduce(function(a,o){ return a + o.pnl; }, 0);
  var perdidaBruta = perdedoras.reduce(function(a,o){ return a + o.pnl; }, 0);
  var profitFactor = perdidaBruta !== 0 ? (gananciaBruta / Math.abs(perdidaBruta)) : null;
  var pnlPromedio = total > 0 ? pnlNeto/total : null;

  var rWin = 0, rLoss = 0, maxWin = 0, maxLoss = 0;
  var equityCurve = [];
  var acumulado = 0;
  ordenadas.forEach(function(o){
    if(o.resultado === "TP" || o.resultado === "TP 1:1"){ rWin += 1; rLoss = 0; } else if(o.resultado === "SL"){ rLoss += 1; rWin = 0; } else { rWin = 0; rLoss = 0; }
    maxWin = Math.max(maxWin, rWin);
    maxLoss = Math.max(maxLoss, rLoss);
    acumulado += o.pnl;
    equityCurve.push({ fecha: o.fecha, acumulado: acumulado });
  });

  var porEstrategia = {};
  ordenadas.forEach(function(o){
    if(!porEstrategia[o.estrategia]) porEstrategia[o.estrategia] = { estrategia:o.estrategia, total:0, ganadoras:0, perdedoras:0, pnl:0 };
    var e = porEstrategia[o.estrategia];
    e.total += 1;
    if(o.resultado==="TP" || o.resultado==="TP 1:1") e.ganadoras += 1;
    if(o.resultado==="SL") e.perdedoras += 1;
    e.pnl += o.pnl;
  });
  var estrategiaRows = Object.keys(porEstrategia).map(function(k){
    var e = porEstrategia[k];
    e.winrate = (e.ganadoras+e.perdedoras) > 0 ? e.ganadoras/(e.ganadoras+e.perdedoras) : null;
    return e;
  }).sort(function(a,b){ return b.pnl - a.pnl; });

  var porActivo = {};
  ordenadas.forEach(function(o){
    if(!porActivo[o.activo]) porActivo[o.activo] = { activo:o.activo, total:0, pnl:0 };
    porActivo[o.activo].total += 1;
    porActivo[o.activo].pnl += o.pnl;
  });
  var activoRows = Object.keys(porActivo).map(function(k){ return porActivo[k]; }).sort(function(a,b){ return b.pnl - a.pnl; });

  // --- Por sesión (Asia / London / NY AM / NY PM) ---
  var porSesion = {};
  SESIONES_FUTUROS.forEach(function(s){ porSesion[s] = { sesion:s, total:0, ganadoras:0, perdedoras:0, pnl:0 }; });
  ordenadas.forEach(function(o){
    var s = o.sesion || SESIONES_FUTUROS[0];
    if(!porSesion[s]) porSesion[s] = { sesion:s, total:0, ganadoras:0, perdedoras:0, pnl:0 };
    porSesion[s].total += 1;
    if(o.resultado==="TP" || o.resultado==="TP 1:1") porSesion[s].ganadoras += 1;
    if(o.resultado==="SL") porSesion[s].perdedoras += 1;
    porSesion[s].pnl += o.pnl;
  });
  var sesionRows = Object.keys(porSesion).map(function(k){
    var e = porSesion[k];
    e.winrate = (e.ganadoras+e.perdedoras) > 0 ? e.ganadoras/(e.ganadoras+e.perdedoras) : null;
    return e;
  }).sort(function(a,b){ return (b.winrate||-1) - (a.winrate||-1); });

  // --- Por día de la semana ---
  var DOW_NOMBRES = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  var porDia = {};
  DOW_NOMBRES.forEach(function(d){ porDia[d] = { dia:d, total:0, ganadoras:0, perdedoras:0, pnl:0 }; });
  ordenadas.forEach(function(o){
    var dt = new Date(o.fecha + 'T00:00:00');
    var d = DOW_NOMBRES[dt.getDay()];
    porDia[d].total += 1;
    if(o.resultado==="TP" || o.resultado==="TP 1:1") porDia[d].ganadoras += 1;
    if(o.resultado==="SL") porDia[d].perdedoras += 1;
    porDia[d].pnl += o.pnl;
  });
  var diaRows = DOW_NOMBRES.slice(1).concat(DOW_NOMBRES.slice(0,1)).map(function(k){ // Lun..Dom
    var e = porDia[k];
    e.winrate = (e.ganadoras+e.perdedoras) > 0 ? e.ganadoras/(e.ganadoras+e.perdedoras) : null;
    return e;
  });
  var diaConDatos = diaRows.filter(function(d){ return d.total > 0; });
  var mejorDia = diaConDatos.length ? diaConDatos.reduce(function(a,b){ return b.pnl > a.pnl ? b : a; }) : null;
  var peorDia = diaConDatos.length ? diaConDatos.reduce(function(a,b){ return b.pnl < a.pnl ? b : a; }) : null;

  // --- Disciplina: causas de fallos ---
  var conFallo = ordenadas.filter(function(o){ return o.huboFalloDisciplina; });
  var porCausa = {};
  CAUSAS_DISCIPLINA.forEach(function(c){ porCausa[c] = { causa:c, total:0, pnl:0 }; });
  conFallo.forEach(function(o){
    (o.disciplinaCausas||[]).forEach(function(c){
      if(!porCausa[c]) porCausa[c] = { causa:c, total:0, pnl:0 };
      porCausa[c].total += 1;
      porCausa[c].pnl += o.pnl;
    });
  });
  var disciplinaRows = Object.keys(porCausa).map(function(k){ return porCausa[k]; }).sort(function(a,b){ return b.total - a.total; });
  var disciplinaStats = {
    totalFallos: conFallo.length,
    pctFallos: total > 0 ? conFallo.length/total : null,
    pnlPerdidoPorFallos: conFallo.reduce(function(a,o){ return a + (o.pnl<0?o.pnl:0); }, 0),
    porCausa: disciplinaRows
  };

  return {
    total: total, ganadoras: ganadoras.length, perdedoras: perdedoras.length, be: be.length,
    winrate: winrate, pnlNeto: pnlNeto, pnlPromedio: pnlPromedio,
    gananciaBruta: gananciaBruta, perdidaBruta: perdidaBruta, profitFactor: profitFactor,
    rachaGanadoraMax: maxWin, rachaPerdedoraMax: maxLoss,
    porEstrategia: estrategiaRows, porActivo: activoRows, equityCurve: equityCurve,
    porSesion: sesionRows, porDia: diaRows, mejorDia: mejorDia, peorDia: peorDia,
    disciplina: disciplinaStats
  };
}

var opciones = [];
var ESTRATEGIAS_OPCIONES = ["Day Trade", "Swing", "Earnings Play", "Spread", "Otra"];
var SESIONES_OPCIONES = ["Pre-market", "Apertura NY", "Mediodía NY", "Cierre NY", "After-hours"];
var RESULTADOS_OPT = ["Ganadora", "Perdedora", "BE"];
var optUiState = { filtroEstrategia: "Todas", filtroActivo: "Todas", expandido: null };

function optUid(){ return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function loadOpciones(){
  try{
    var res = await window.storage.get(OPT_STORAGE_KEY, false);
    opciones = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    opciones = [];
  }
}

async function saveOpciones(){
  try{
    var result = await window.storage.set(OPT_STORAGE_KEY, JSON.stringify(opciones), false);
    return !!result;
  }catch(e){
    console.error("Storage error (opciones)", e);
    return false;
  }
}

async function addOpcion(data){
  var capital = Number(data.capitalInvertido) || 0;
  var pnlBruto = Number(data.pnlBruto) || 0;
  var p = {
    id: optUid(),
    fechaHora: data.fechaHora || new Date().toISOString().slice(0,16),
    activo: data.activo || "",
    contrato: data.contrato || "",
    sesion: data.sesion || SESIONES_OPCIONES[0],
    estrategia: data.estrategia || "Otra",
    direccion: data.direccion || "CALL",
    contexto: data.contexto === "Sí",
    gatillo: data.gatillo === "Sí",
    resultado: data.resultado || "BE",
    capitalInvertido: capital,
    pnlBruto: pnlBruto,
    notas: data.notas || "",
    linkTV: data.linkTV || ""
  };
  opciones.push(p);
  await saveOpciones();
  return p;
}

async function deleteOpcion(id){
  opciones = opciones.filter(function(o){ return o.id !== id; });
  await saveOpciones();
}

async function resetOpciones(){
  opciones = [];
  await saveOpciones();
}

function pctGP(o){
  return o.capitalInvertido > 0 ? (o.pnlBruto / o.capitalInvertido) : null;
}

function filteredOpciones(){
  return opciones.filter(function(o){
    if(optUiState.filtroEstrategia !== "Todas" && o.estrategia !== optUiState.filtroEstrategia) return false;
    if(optUiState.filtroActivo !== "Todas" && o.activo !== optUiState.filtroActivo) return false;
    return true;
  });
}

function statsOpciones(lista){
  var ordenadas = lista.slice().sort(function(a,b){ return a.fechaHora < b.fechaHora ? -1 : 1; });
  var ganadoras = ordenadas.filter(function(o){ return o.resultado === "Ganadora"; });
  var perdedoras = ordenadas.filter(function(o){ return o.resultado === "Perdedora"; });
  var be = ordenadas.filter(function(o){ return o.resultado === "BE"; });
  var total = ordenadas.length;
  var winrate = (ganadoras.length + perdedoras.length) > 0 ? ganadoras.length / (ganadoras.length + perdedoras.length) : null;
  var pnlNeto = ordenadas.reduce(function(a,o){ return a + o.pnlBruto; }, 0);
  var capitalTotalInvertido = ordenadas.reduce(function(a,o){ return a + o.capitalInvertido; }, 0);
  var gananciaBruta = ganadoras.reduce(function(a,o){ return a + o.pnlBruto; }, 0);
  var perdidaBruta = perdedoras.reduce(function(a,o){ return a + o.pnlBruto; }, 0);
  var profitFactor = perdidaBruta !== 0 ? (gananciaBruta / Math.abs(perdidaBruta)) : null;
  var roiPromedio = capitalTotalInvertido > 0 ? pnlNeto/capitalTotalInvertido : null;

  var acumulado = 0;
  var equityCurve = ordenadas.map(function(o){ acumulado += o.pnlBruto; return { fecha:o.fechaHora, acumulado:acumulado }; });

  var porEstrategia = {};
  ordenadas.forEach(function(o){
    if(!porEstrategia[o.estrategia]) porEstrategia[o.estrategia] = { estrategia:o.estrategia, total:0, ganadoras:0, perdedoras:0, pnl:0 };
    var e = porEstrategia[o.estrategia];
    e.total += 1;
    if(o.resultado==="Ganadora") e.ganadoras += 1;
    if(o.resultado==="Perdedora") e.perdedoras += 1;
    e.pnl += o.pnlBruto;
  });
  var estrategiaRows = Object.keys(porEstrategia).map(function(k){
    var e = porEstrategia[k];
    e.winrate = (e.ganadoras+e.perdedoras) > 0 ? e.ganadoras/(e.ganadoras+e.perdedoras) : null;
    return e;
  }).sort(function(a,b){ return b.pnl - a.pnl; });

  return {
    total: total, ganadoras: ganadoras.length, perdedoras: perdedoras.length, be: be.length,
    winrate: winrate, pnlNeto: pnlNeto, capitalTotalInvertido: capitalTotalInvertido, roiPromedio: roiPromedio,
    gananciaBruta: gananciaBruta, perdidaBruta: perdidaBruta, profitFactor: profitFactor,
    porEstrategia: estrategiaRows, equityCurve: equityCurve
  };
}

function renderHeader(){

    '<div class="brand">' +

function isDarkTheme(){ return document.body.classList.contains('theme-dark'); }

function wireHeaderEvents(){
  document.getElementById('resetBtn').onclick = async function(){
    if(confirm('¿Borrar TODAS las cuentas y movimientos? Esto no se puede deshacer.')){
      await resetTodo();
      render();
    }
  };
  document.getElementById('exportBtn').onclick = function(){
    var blob = new Blob([JSON.stringify(cuentas, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'centro-de-fondeo-backup.json';
    document.body.appendChild(a);

function statCard(label, value, sub, tone){
  return '<div class="stat-card">' +
    '<span class="stat-label">' + label + '</span>' +
    '<span class="stat-value ' + (tone||'') + '">' + value + '</span>' +
    (sub ? '<span class="stat-sub">' + sub + '</span>' : '') +
  '</div>';
}

function renderDashboard(){
  var g = statsGlobal(cuentas);
  var sf = statsOperaciones(operaciones);
  var so = statsOpciones(opciones);
  var totalTrades = sf.total + so.total;
  var totalGanadoras = sf.ganadoras + so.ganadoras;
  var totalPerdedoras = sf.perdedoras + so.perdedoras;
  var combinedWr = (totalGanadoras+totalPerdedoras) > 0 ? totalGanadoras/(totalGanadoras+totalPerdedoras) : null;
  var combinedGB = sf.gananciaBruta + so.gananciaBruta;
  var combinedPB = sf.perdidaBruta + so.perdidaBruta;
  var combinedPF = combinedPB !== 0 ? combinedGB/Math.abs(combinedPB) : null;
  var wr = combinedWr===null?0:combinedWr;
  var pf = combinedPF===null?0:Math.min(combinedPF,3);

  var gaugesHtml = '<div class="gauge-row">' +
    gaugeCard('Win Rate Combinado', dialGaugeSVG(wr), fmtPct(combinedWr), null, totalGanadoras+'G', totalPerdedoras+'P') +
    gaugeCard('Profit Factor Combinado', ringGaugeSVG(pf/3, {color:(combinedPF!==null && combinedPF>=1)?'#3DBA8B':'#E0654B'}), combinedPF===null?'—':combinedPF.toFixed(2), null, fmt(combinedGB), fmt(combinedPB)) +
  '</div>';

  var html =
    statCard('Evaluaciones', g.evaluaciones, cuentas.filter(function(c){return c.estado==="Activa" && c.tipo==="Evaluación";}).length + ' activas') +
    statCard('Cuentas Live / Fondeadas', g.live, '') +
    statCard('Funding Ratio', fmtPct(g.fundingRatio), 'pasadas / evaluaciones') +
    statCard('Gastos Totales', fmt(g.gastos), '', 'neg') +
    statCard('Ganancias Totales', fmt(g.ganancias), '', 'pos') +
    statCard('Beneficio Neto', fmt(g.beneficio), '', g.beneficio>=0?'pos':'neg') +
    statCard('ROI Global', fmtPct(g.roi), '');
  document.getElementById('dashGrid').innerHTML = gaugesHtml + '<div class="dashboard-grid">' + html + '</div>';
}

function renderEmpresas(){
  var rows = statsPorEmpresa(cuentas);

    ? '<tr><td colspan="5" class="empty-cell">Sin cuentas registradas todavía</td></tr>'
    : rows.map(function(e){
        return '<tr>' +
          '<td>' + e.empresa + '</td>' +
          '<td class="mono">' + e.cuentas + '</td>' +
          '<td class="mono neg">' + fmt(e.gastos) + '</td>' +
          '<td class="mono pos">' + fmt(e.ganancias) + '</td>' +
          '<td class="mono ' + (e.beneficio>=0?'pos':'neg') + '">' + fmt(e.beneficio) + '</td>' +
          '<td class="mono">' + fmtPct(e.roi) + '</td>' +
        '</tr>';
      }).join('');
  document.getElementById('empresaPanel').innerHTML =
    '<h2 class="panel-title">Análisis por Empresa</h2>' +
    '<div class="table-wrap"><table><thead><tr><th>Empresa</th><th>Cuentas</th><th>Gastos</th><th>Ganancias</th><th>Beneficio</th><th>ROI</th></tr></thead>' +

function renderCuentas(){
  var ui = getUiState();
  var lista = filteredCuentas();
  var filtros =
    '<div class="filters">' +
      selectFilter('filtroTipo', ['Todas'].concat(TIPOS), ui.filtroTipo) +
      selectFilter('filtroEstado', ['Todos'].concat(ESTADOS), ui.filtroEstado) +
      selectFilter('filtroEmpresa', ['Todas'].concat(EMPRESA_NAMES), ui.filtroEmpresa) +
      '<button type="button" class="btn-primary" id="nuevaCuentaBtn">+ Nueva Cuenta</button>' +
    '</div>';

  var lista_html = lista.length === 0
    ? '<div class="empty-cell">No hay cuentas que coincidan con el filtro.</div>'
    : lista.map(renderCuentaCard).join('');

  document.getElementById('cuentasPanel').innerHTML =
    '<h2 class="panel-title">Cuentas</h2>' + filtros + '<div class="cuentas-list">' + lista_html + '</div>';

  document.getElementById('nuevaCuentaBtn').onclick = function(){ openModalNuevaCuenta(); };
  ['filtroTipo','filtroEstado','filtroEmpresa'].forEach(function(id){
    document.getElementById(id).onchange = function(e){ ui[id] = e.target.value; renderCuentas(); };
  });
  lista.forEach(function(c){ wireCuentaCard(c); });
}

function selectFilter(id, options, current){
  return '<select id="' + id + '" class="select-filter">' +
    options.map(function(o){ return '<option value="' + o + '"' + (o===current?' selected':'') + '>' + o + '</option>'; }).join('') +
  '</select>';
}

var ESTADO_CLASS = { "Activa":"badge-pass", "Pasada":"badge-pass2", "Suspendida":"badge-warn", "Quemada":"badge-block" };

function renderCuentaCard(c){
  var s = statsCuenta(c);
  var expandido = getUiState().expandido === c.id;
  return '' +
  '<div class="cuenta-card" data-id="' + c.id + '">' +
    '<div class="cuenta-row cuenta-summary">' +
      '<div class="cuenta-id">' +
        '<span class="cuenta-nombre">' + c.nombre + '</span>' +
        '<span class="cuenta-meta">' + c.empresa + ' · ' + c.tipo + ' · ' + fmt(c.tamano) + '</span>' +
      '</div>' +
      '<span class="badge ' + (ESTADO_CLASS[c.estado]||'') + '">' + c.estado + '</span>' +
      '<div class="cuenta-nums">' +
        '<div><span class="num-label">Gastos</span><span class="mono neg">' + fmt(s.gastos) + '</span></div>' +
        '<div><span class="num-label">Ganancias</span><span class="mono pos">' + fmt(s.ganancias) + '</span></div>' +
        '<div><span class="num-label">Beneficio</span><span class="mono ' + (s.beneficio>=0?'pos':'neg') + '">' + fmt(s.beneficio) + '</span></div>' +
        '<div><span class="num-label">ROI</span><span class="mono">' + fmtPct(s.roi) + '</span></div>' +
      '</div>' +
      '<button type="button" class="btn-ghost small toggle-btn">' + (expandido ? 'Cerrar' : 'Detalle') + '</button>' +
    '</div>' +
    (expandido ? renderCuentaDetalle(c) : '') +
  '</div>';
}

function renderCuentaDetalle(c){
  var ref = EMPRESAS_REF[c.empresa] || EMPRESAS_REF["Otra empresa"];
  var movs = (c.gastos.map(function(g){ return {tipo:'gasto', fecha:g.fecha, monto:g.monto, motivo:g.motivo}; }))
    .concat(c.ganancias.map(function(g){ return {tipo:'ganancia', fecha:g.fecha, monto:g.monto, motivo:g.motivo}; }))
    .sort(function(a,b){ return (a.fecha < b.fecha) ? 1 : -1; });

  var movRows = movs.length === 0
    ? '<div class="empty-cell">Sin movimientos aún</div>'
    : movs.map(function(m){
        return '<div class="mov-row"><span class="mov-fecha mono">' + m.fecha + '</span>' +
          '<span class="mov-tag ' + (m.tipo==='gasto'?'tag-gasto':'tag-ganancia') + '">' + (m.tipo==='gasto'?'GASTO':'GANANCIA') + '</span>' +
          '<span class="mov-motivo">' + (m.motivo||'—') + '</span>' +
          '<span class="mono ' + (m.tipo==='gasto'?'neg':'pos') + '">' + fmt(m.monto) + '</span></div>';
      }).join('');

  return '<div class="cuenta-detalle">' +
    '<div class="detalle-cols">' +
      '<div class="detalle-col">' +
        '<h3 class="detalle-subtitle">Movimientos</h3>' +
        '<div class="mov-list">' + movRows + '</div>' +
        '<div class="detalle-actions">' +
          '<button type="button" class="btn-ghost small btn-gasto">+ Gasto</button>' +
          '<button type="button" class="btn-ghost small btn-ganancia">+ Ganancia</button>' +
        '</div>' +
        '<div class="detalle-actions">' +
          '<label class="estado-label">Estado<select class="estado-select">' +
            ESTADOS.map(function(e){ return '<option value="' + e + '"' + (e===c.estado?' selected':'') + '>' + e + '</option>'; }).join('') +
          '</select></label>' +
          '<button type="button" class="btn-ghost small danger btn-eliminar">Eliminar cuenta</button>' +
        '</div>' +
      '</div>' +
      '<div class="detalle-col">' +
        '<h3 class="detalle-subtitle">Reglas — ' + c.empresa + '</h3>' +
        '<div class="reglas-box">' +
          '<p><strong>Evaluación:</strong> ' + ref.drawdownEval + '</p>' +
          '<p><strong>DLL:</strong> ' + ref.dllEval + '</p>' +
          '<p><strong>Objetivo:</strong> ' + ref.objetivoEval + '</p>' +
          '<p><strong>Fondeada:</strong> ' + ref.fondeada + '</p>' +
          '<p><strong>Live:</strong> ' + ref.live + '</p>' +
        '</div>' +
        '<div class="alerta-box"><strong>Recomendación adaptada:</strong> ' + ref.alerta + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function wireCuentaCard(c){
  var card = document.querySelector('.cuenta-card[data-id="' + c.id + '"]');
  if(!card) return;
  card.querySelector('.toggle-btn').onclick = function(){
    var ui = getUiState();
    ui.expandido = (ui.expandido === c.id) ? null : c.id;
    renderCuentas();
  };
  var btnGasto = card.querySelector('.btn-gasto');
  if(btnGasto) btnGasto.onclick = function(){ openModalMovimiento(c.id, 'gasto'); };
  var btnGanancia = card.querySelector('.btn-ganancia');
  if(btnGanancia) btnGanancia.onclick = function(){ openModalMovimiento(c.id, 'ganancia'); };
  var estadoSelect = card.querySelector('.estado-select');
  if(estadoSelect) estadoSelect.onchange = async function(e){ await setEstado(c.id, e.target.value); renderDashboard(); renderEmpresas(); renderCuentas(); };
  var btnEliminar = card.querySelector('.btn-eliminar');
  if(btnEliminar) btnEliminar.onclick = async function(){
    if(confirm('¿Eliminar "' + c.nombre + '"? Esto borra también sus movimientos.')){
      await deleteCuenta(c.id);
      render();
    }
  };
}

    '<div class="modal-actions">' +
      '<button type="button" class="btn-ghost" id="mv_cancel">Cancelar</button>' +
      '<button type="button" class="btn-primary" id="mv_save">Guardar</button>' +
    '</div>' +
  '</div></div>';

  document.getElementById('mv_cancel').onclick = closeModal;

    await addMovimiento(cuentaId, tipo, document.getElementById('mv_monto').value, document.getElementById('mv_motivo').value, document.getElementById('mv_fecha').value);

async function init(){
  document.getElementById('app').innerHTML = '<div class="loading">Cargando tus datos…</div>';
  await loadCuentas();
  await loadOperaciones();
  await loadOpciones();
  appReady = true;

  var app = document.getElementById('app');

  wireHeaderEvents();
  wireTabsNav();

function renderTabsNav(){
  return '<nav class="tabs-nav">' + TABS.map(function(t){
    return '<button type="button" class="tab-btn' + (currentTab===t[0]?' tab-active':'') + '" data-tab="' + t[0] + '">' + t[1] + '</button>';
  }).join('') + '</nav>';
}

function wireTabsNav(){
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.onclick = function(){ currentTab = btn.dataset.tab; render(); };
  });
}

function wireHeaderEvents(){
  document.getElementById('themeToggle').onclick = function(){
    document.body.classList.toggle('theme-dark');
    render();
  };
  document.getElementById('resetBtn').onclick = async function(){
    if(confirm('¿Borrar TODO (cuentas, operaciones y opciones)? Esto no se puede deshacer.')){
      await resetTodo();
      await resetOperaciones();
      await resetOpciones();
      render();
    }
  };
  document.getElementById('exportBtn').onclick = function(){
    var data = { cuentas: cuentas, operaciones: operaciones, opciones: opciones, exportado: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');

var dashEquityRange = 'ALL';
var EQUITY_RANGES = [['1W','1 Semana'],['1M','1 Mes'],['1Y','1 Año'],['ALL','Todo']];

function buildCombinedEquityCurve(range){
  var map = dailyCapitalMap();
  var dates = Object.keys(map).sort();
  var curveFull = [];
  var acc = 0;
  dates.forEach(function(d){ acc += map[d]; curveFull.push({ fecha: d, acumulado: acc }); });
  if(range === 'ALL' || curveFull.length === 0) return curveFull;
  var now = new Date();
  var cutoff = new Date(now);
  if(range === '1W') cutoff.setDate(now.getDate() - 7);
  else if(range === '1M') cutoff.setMonth(now.getMonth() - 1);
  else if(range === '1Y') cutoff.setFullYear(now.getFullYear() - 1);
  var cutoffStr = cutoff.getFullYear() + '-' + pad2(cutoff.getMonth()+1) + '-' + pad2(cutoff.getDate());
  var filtered = curveFull.filter(function(p){ return p.fecha >= cutoffStr; });
  return filtered.length > 0 ? filtered : curveFull.slice(-1);
}

function renderEquityPanel(){
  var panel = document.getElementById('equityPanel');
  if(!panel) return;
  var curve = buildCombinedEquityCurve(dashEquityRange);
  panel.innerHTML =

// HELPER: GRÁFICO DE LÍNEA SVG (curva de equity, sin dependencias)
// ============================================================
function svgLineChart(curve, opts){
  opts = opts || {};
  var w = opts.width || 600, h = opts.height || 150, pad = 28;
  if(!curve || curve.length === 0){
    return '<div class="chart-empty">Sin operaciones registradas todavía</div>';
  }
  var values = curve.map(function(p){ return p.acumulado; });
  var min = Math.min(0, Math.min.apply(null, values));
  var max = Math.max(0, Math.max.apply(null, values));
  if(min === max){ min -= 1; max += 1; }
  var n = curve.length;
  function x(i){ return n<=1 ? pad : pad + (i/(n-1)) * (w - pad*2); }
  function y(v){ return h - pad - ((v-min)/(max-min)) * (h - pad*2); }
  var pts = curve.map(function(p,i){ return x(i).toFixed(1) + ',' + y(p.acumulado).toFixed(1); }).join(' ');
  var zeroY = y(0).toFixed(1);
  var last = values[values.length-1];
  var color = last >= 0 ? 'var(--accent-pass)' : 'var(--accent-block)';
  var areaPts = pad.toFixed(1) + ',' + (h-pad) + ' ' + pts + ' ' + x(n-1).toFixed(1) + ',' + (h-pad);
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" class="equity-svg" preserveAspectRatio="none">' +
    '<line x1="' + pad + '" y1="' + zeroY + '" x2="' + (w-pad) + '" y2="' + zeroY + '" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>' +
    '<polygon points="' + areaPts + '" fill="' + color + '" opacity="0.08"/>' +
    '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="2"/>' +
  '</svg>';
}

function renderOperacionesTabla(lista){

  var head = cols.map(function(k){ return '<th>' + OP_COLUMN_LABELS[k] + '</th>'; }).join('') + '<th></th>';
  var rows = ordenadas.map(function(o){
    var cells = cols.map(function(k){
      if(k==='fecha') return '<td class="mono">' + o.fecha + '</td>';
      if(k==='activo') return '<td>' + o.activo + '</td>';
      if(k==='direccion') return '<td>' + o.direccion + '</td>';
      if(k==='estrategia') return '<td>' + o.estrategia + '</td>';
      if(k==='sesion') return '<td>' + (o.sesion||'—') + '</td>';
      if(k==='cuenta') return '<td>' + nombreCuenta(o.cuentaId) + '</td>';
      if(k==='riesgo') return '<td class="mono">' + fmt(o.riesgo) + '</td>';
      if(k==='resultado') return '<td><span class="badge ' + ((o.resultado==='TP'||o.resultado==='TP 1:1')?'badge-pass':o.resultado==='SL'?'badge-block':'badge-pass2') + '">' + o.resultado + '</span></td>';
      if(k==='pnl') return '<td class="mono ' + (o.pnl>=0?'pos':'neg') + '">' + fmt(o.pnl) + '</td>';
      if(k==='disciplina') return '<td>' + (o.huboFalloDisciplina ? ('<span class="badge badge-block" title="' + (o.disciplinaCausas||[]).join(', ') + '">' + (o.disciplinaCausas||[]).length + ' fallo(s)</span>') : '<span class="badge badge-pass">OK</span>') + '</td>';
      return '<td></td>';
    }).join('');
    return '<tr>' + cells + '<td><button type="button" class="btn-ghost small ver-op" data-id="' + o.id + '">Ver</button> <button type="button" class="btn-ghost small danger del-op" data-id="' + o.id + '">Eliminar</button></td></tr>';
  }).join('');
  return '<table><thead><tr>' + head + '</tr></thead><tbody>' + rows + '</tbody></table>';
}

  var panel = document.getElementById('optColumnsPanel');
  if(panel) Object.keys(optColumnsVisible).forEach(function(k){
    var box = document.getElementById('optcol_' + k);
    if(box) box.onchange = function(e){ optColumnsVisible[k] = e.target.checked; renderTabContent(); };
  });
  document.getElementById('nuevaOptBtn').onclick = openModalNuevaOpcion;
  lista.forEach(function(o){
    var btn = document.querySelector('.del-opt[data-id="' + o.id + '"]');
    if(btn) btn.onclick = async function(){ if(confirm('¿Eliminar esta operación de opciones?')){ await deleteOpcion(o.id); renderTabContent(); } };
  });
}

function renderOpcionesGauges(lista){
  var s = statsOpciones(lista);
  var wr = s.winrate===null ? 0 : s.winrate;
  var pf = s.profitFactor===null ? 0 : Math.min(s.profitFactor, 3);
  return '<div class="gauge-row">' +
    gaugeCard('Win Rate', dialGaugeSVG(wr), fmtPct(s.winrate), null, s.ganadoras+'G', s.perdedoras+'P') +
    gaugeCard('Profit Factor', ringGaugeSVG(pf/3, {color: (s.profitFactor!==null && s.profitFactor>=1) ? '#3DBA8B' : '#E0654B'}), s.profitFactor===null?'—':s.profitFactor.toFixed(2), null, fmt(s.gananciaBruta), fmt(s.perdidaBruta)) +
    statCard('Total Operaciones', s.total, '') +
    statCard('ROI Promedio', fmtPct(s.roiPromedio), '') +
  '</div>';
}

function filteredOpcionesFull(){
  return opciones.filter(function(o){
    if(optUiState.filtroEstrategia !== "Todas" && o.estrategia !== optUiState.filtroEstrategia) return false;
    if(optFiltroResultado !== "Todas" && o.resultado !== (optFiltroResultado==='Ganadora'?'Ganadora':optFiltroResultado==='Perdedora'?'Perdedora':'BE')) return false;
    if(optSearchText && o.activo.toLowerCase().indexOf(optSearchText.toLowerCase()) === -1) return false;
    return true;
  });
}

function renderOpcionesTabla(lista){
  if(lista.length === 0) return '<div class="empty-cell">Sin operaciones de opciones que coincidan con el filtro.</div>';
  var ordenadas = lista.slice().sort(function(a,b){ return a.fechaHora < b.fechaHora ? 1 : -1; });
  var cols = Object.keys(optColumnsVisible).filter(function(k){ return optColumnsVisible[k]; });
  var head = cols.map(function(k){ return '<th>' + OPT_COLUMN_LABELS[k] + '</th>'; }).join('') + '<th></th>';
  var rows = ordenadas.map(function(o){
    var pct = pctGP(o);
    var cells = cols.map(function(k){
      if(k==='fecha') return '<td class="mono">' + o.fechaHora + '</td>';
      if(k==='activo') return '<td>' + o.activo + '</td>';
      if(k==='contrato') return '<td>' + o.contrato + '</td>';
      if(k==='direccion') return '<td>' + o.direccion + '</td>';
      if(k==='estrategia') return '<td>' + o.estrategia + '</td>';
      if(k==='resultado') return '<td><span class="badge ' + (o.resultado==='Ganadora'?'badge-pass':o.resultado==='Perdedora'?'badge-block':'badge-pass2') + '">' + o.resultado + '</span></td>';
      if(k==='capital') return '<td class="mono">' + fmt(o.capitalInvertido) + '</td>';
      if(k==='pnl') return '<td class="mono ' + (o.pnlBruto>=0?'pos':'neg') + '">' + fmt(o.pnlBruto) + '</td>';
      if(k==='pct') return '<td class="mono">' + fmtPct(pct) + '</td>';
      return '<td></td>';
    }).join('');
    return '<tr>' + cells + '<td><button type="button" class="btn-ghost small danger del-opt" data-id="' + o.id + '">Eliminar</button></td></tr>';
  }).join('');
  return '<table><thead><tr>' + head + '</tr></thead><tbody>' + rows + '</tbody></table>';
}

var nuevaOpcionLegsCount = 1;
var nuevaOpcionLegsData = [];

function openModalNuevaOpcion(){
  nuevaOpcionLegsCount = 1;
  nuevaOpcionLegsData = [{},{},{},{}];
  renderModalNuevaOpcion();
}

function renderModalNuevaOpcion(){
  var root = document.getElementById('modalRoot');
  var legsHtml = '';
  for(var i=0;i<nuevaOpcionLegsCount;i++){
    legsHtml += renderLegBox(i);
  }
  root.innerHTML = '<div class="modal-overlay"><div class="modal" style="max-width:520px;">' +
    '<h2 class="modal-title">Nueva Operación (Opciones)</h2>' +
    '<div class="leg-selector"><span class="leg-hint">N° de piernas (legs):</span>' +
      [1,2,3,4].map(function(n){ return '<button type="button" class="leg-num-btn' + (nuevaOpcionLegsCount===n?' leg-active':'') + '" data-legs="' + n + '">' + n + '</button>'; }).join('') +
    '</div>' +
    '<span class="leg-hint">Todas las piernas comparten fecha, activo, sesión y estrategia.</span>' +
    '<div class="modal-row"><label>Fecha/Hora (NY)<input type="datetime-local" id="p_fecha" value="' + new Date().toISOString().slice(0,16) + '"></label>' +
      '<label>Activo<input type="text" id="p_activo" placeholder="SPY, QQQ…"></label></div>' +
    '<div class="modal-row"><label>Sesión<select id="p_sesion">' + SESIONES_OPCIONES.map(function(s){return '<option>'+s+'</option>';}).join('') + '</select></label>' +
      '<label>Estrategia<select id="p_estrategia">' + ESTRATEGIAS_OPCIONES.map(function(s){return '<option>'+s+'</option>';}).join('') + '</select></label></div>' +
    legsHtml +
    '<div class="modal-row"><label>¿Contexto OK?<select id="p_contexto"><option>Sí</option><option>No</option></select></label>' +
      '<label>¿Gatillo OK?<select id="p_gatillo"><option>Sí</option><option>No</option></select></label></div>' +
    '<div class="modal-row"><label>Capital invertido total ($)<input type="number" id="p_capital" value="500" step="50"></label>' +
      '<label>P&L bruto total ($)<input type="number" id="p_pnl" value="0" step="10"></label></div>' +
    '<label>Resultado<select id="p_resultado">' + RESULTADOS_OPT.map(function(s){return '<option>'+s+'</option>';}).join('') + '</select></label>' +
    '<label>Link TradingView (opcional)<input type="text" id="p_link" placeholder="https://..."></label>' +
    '<div class="modal-actions"><button type="button" class="btn-ghost" id="p_cancel">Cancelar</button><button type="button" class="btn-primary" id="p_save">Guardar</button></div>' +
  '</div></div>';

  document.querySelectorAll('.leg-num-btn').forEach(function(b){
    b.onclick = function(){
      saveLegInputsToData();
      nuevaOpcionLegsCount = parseInt(b.dataset.legs, 10);
      renderModalNuevaOpcion();
    };
  });
  document.getElementById('p_cancel').onclick = closeModal;
  document.getElementById('p_save').onclick = async function(){
    saveLegInputsToData();
    var primaryLeg = nuevaOpcionLegsData[0] || {};
    await addOpcion({
      fechaHora: document.getElementById('p_fecha').value,
      activo: document.getElementById('p_activo').value.trim() || '—',
      contrato: legsSummary(),
      direccion: primaryLeg.tipo || 'CALL',
      sesion: document.getElementById('p_sesion').value,
      estrategia: document.getElementById('p_estrategia').value,
      contexto: document.getElementById('p_contexto').value,
      gatillo: document.getElementById('p_gatillo').value,
      capitalInvertido: document.getElementById('p_capital').value,
      pnlBruto: document.getElementById('p_pnl').value,
      resultado: document.getElementById('p_resultado').value,
      linkTV: document.getElementById('p_link').value,
      legs: nuevaOpcionLegsData.slice(0, nuevaOpcionLegsCount)
    });
    closeModal();
    renderTabContent();
  };
}

function renderLegBox(i){
  var d = nuevaOpcionLegsData[i] || {};
  return '<div class="leg-box"><p class="leg-box-title">Leg ' + (i+1) + '</p>' +
    '<div class="leg-grid">' +
      '<label>Tipo<select id="leg_tipo_' + i + '"><option' + (d.tipo==='CALL'?' selected':'') + '>CALL</option><option' + (d.tipo==='PUT'?' selected':'') + '>PUT</option></select></label>' +
      '<label>Acción<select id="leg_accion_' + i + '"><option' + (d.accion==='BUY'?' selected':'') + '>BUY</option><option' + (d.accion==='SELL'?' selected':'') + '>SELL</option></select></label>' +
      '<label>Strike<input type="number" id="leg_strike_' + i + '" value="' + (d.strike!==undefined?d.strike:'') + '" step="1"></label>' +
      '<label>Vencimiento<input type="date" id="leg_exp_' + i + '" value="' + (d.exp||'') + '"></label>' +
      '<label>Prima<input type="number" id="leg_prima_' + i + '" value="' + (d.prima!==undefined?d.prima:'') + '" step="0.01"></label>' +
      '<label>Contratos<input type="number" id="leg_contratos_' + i + '" value="' + (d.contratos!==undefined?d.contratos:1) + '" step="1"></label>' +
    '</div></div>';
}

function saveLegInputsToData(){
  for(var i=0;i<nuevaOpcionLegsCount;i++){
    var tipoEl = document.getElementById('leg_tipo_' + i);
    if(!tipoEl) continue;
    nuevaOpcionLegsData[i] = {
      tipo: tipoEl.value,
      accion: document.getElementById('leg_accion_' + i).value,
      strike: document.getElementById('leg_strike_' + i).value,
      exp: document.getElementById('leg_exp_' + i).value,
      prima: document.getElementById('leg_prima_' + i).value,
      contratos: document.getElementById('leg_contratos_' + i).value
    };
  }
}

function legsSummary(){
  var parts = [];
  for(var i=0;i<nuevaOpcionLegsCount;i++){
    var d = nuevaOpcionLegsData[i];
    if(!d || d.strike===undefined || d.strike==='') continue;
    parts.push((d.accion||'') + ' ' + (d.tipo||'') + ' ' + d.strike + (d.exp?(' '+d.exp):''));
  }
  return parts.join(' / ') || '—';
}

// ============================================================
// PESTAÑA: ESTADÍSTICAS
// ============================================================
var statsModo = 'futuros';

function renderEstadisticasTab(c){
  var s = statsModo === 'futuros' ? statsOperaciones(operaciones) : statsOpciones(opciones);
  c.innerHTML = '<div class="panel">' +
    '<div class="filters">' +
      '<button type="button" class="btn-ghost small' + (statsModo==='futuros'?' tab-active':'') + '" id="modoFuturos">Futuros</button>' +
      '<button type="button" class="btn-ghost small' + (statsModo==='opciones'?' tab-active':'') + '" id="modoOpciones">Opciones</button>' +
    '</div>' +
    '<div class="dashboard-grid">' +
      statCard('Total Operaciones', s.total, '') +
      statCard('Win Rate', fmtPct(s.winrate), s.ganadoras + 'G / ' + s.perdedoras + 'P' + (s.be!==undefined?' / ' + s.be + 'BE':'')) +
      statCard('Profit Factor', s.profitFactor===null?'—':s.profitFactor.toFixed(2), '') +
      statCard('P&L Neto', fmt(s.pnlNeto), '', s.pnlNeto>=0?'pos':'neg') +
      (statsModo==='futuros' ? statCard('Racha Ganadora Máx', s.rachaGanadoraMax + ' ops', '') : statCard('ROI Promedio', fmtPct(s.roiPromedio), '')) +
      (statsModo==='futuros' ? statCard('Racha Perdedora Máx', s.rachaPerdedoraMax + ' ops', '') : statCard('Capital Invertido', fmt(s.capitalTotalInvertido), '')) +
    '</div>' +
    '<h3 class="detalle-subtitle" style="margin-top:18px;">Curva de Equity</h3>' +
    '<div class="chart-wrap">' + svgLineChart(s.equityCurve) + '</div>' +
    '<h3 class="detalle-subtitle" style="margin-top:18px;">Por Estrategia</h3>' +
    renderBreakdownTabla(s.porEstrategia, 'estrategia') +
    (statsModo==='futuros' ? ('<h3 class="detalle-subtitle" style="margin-top:18px;">Por Activo</h3>' + renderBreakdownTabla(s.porActivo, 'activo')) : '') +
    (statsModo==='futuros' ? renderSesionYDiaSection(s) : '') +
    (statsModo==='futuros' ? renderDisciplinaSection(s.disciplina) : '') +
  '</div>';

  document.getElementById('modoFuturos').onclick = function(){ statsModo = 'futuros'; renderTabContent(); };
  document.getElementById('modoOpciones').onclick = function(){ statsModo = 'opciones'; renderTabContent(); };
}

function renderSesionYDiaSection(s){
  var mejorTxt = s.mejorDia ? (s.mejorDia.dia + ' (' + fmt(s.mejorDia.pnl) + ')') : '—';
  var peorTxt = s.peorDia ? (s.peorDia.dia + ' (' + fmt(s.peorDia.pnl) + ')') : '—';
  var sesionHead = '<tr><th>Sesión</th><th>Total</th><th>Win%</th><th>P&L</th></tr>';
  var sesionBody = s.porSesion.map(function(r){
    return '<tr><td>' + r.sesion + '</td><td class="mono">' + r.total + '</td><td class="mono">' + fmtPct(r.winrate) + '</td><td class="mono ' + (r.pnl>=0?'pos':'neg') + '">' + fmt(r.pnl) + '</td></tr>';
  }).join('');
  var diaHead = '<tr><th>Día</th><th>Total</th><th>Win%</th><th>P&L</th></tr>';
  var diaBody = s.porDia.map(function(r){
    return '<tr><td>' + r.dia + '</td><td class="mono">' + r.total + '</td><td class="mono">' + fmtPct(r.winrate) + '</td><td class="mono ' + (r.pnl>=0?'pos':'neg') + '">' + fmt(r.pnl) + '</td></tr>';
  }).join('');
  return '<h3 class="stat-block-title">Por Sesión y Día de la Semana</h3>' +
    '<div class="gauge-row" style="margin-bottom:12px;">' +
      statCard('Mejor Día (P&L)', mejorTxt, '', s.mejorDia && s.mejorDia.pnl>=0?'pos':'neg') +
      statCard('Peor Día (P&L)', peorTxt, '', s.peorDia && s.peorDia.pnl<0?'neg':'') +
    '</div>' +
    '<div class="detalle-cols">' +
      '<div class="detalle-col"><h4 class="detalle-subtitle">Por Sesión</h4><div class="table-wrap"><table><thead>' + sesionHead + '</thead><tbody>' + sesionBody + '</tbody></table></div></div>' +
      '<div class="detalle-col"><h4 class="detalle-subtitle">Por Día de la Semana</h4><div class="table-wrap"><table><thead>' + diaHead + '</thead><tbody>' + diaBody + '</tbody></table></div></div>' +
    '</div>';
}

function renderDisciplinaSection(d){
  var causasHead = '<tr><th>Causa</th><th>Ocurrencias</th><th>P&L asociado</th></tr>';
  var causasConDatos = d.porCausa.filter(function(c){ return c.total > 0; });
  var causasBody = causasConDatos.length === 0
    ? '<tr><td colspan="3" class="empty-cell">Sin fallos de disciplina registrados</td></tr>'
    : causasConDatos.sort(function(a,b){return b.total-a.total;}).map(function(c){
        return '<tr><td>' + c.causa + '</td><td class="mono">' + c.total + '</td><td class="mono ' + (c.pnl>=0?'pos':'neg') + '">' + fmt(c.pnl) + '</td></tr>';
      }).join('');
  return '<h3 class="stat-block-title">Control de Disciplina</h3>' +
    '<div class="gauge-row" style="margin-bottom:12px;">' +
      statCard('Trades con fallo de disciplina', d.totalFallos, fmtPct(d.pctFallos) + ' del total') +
      statCard('P&L perdido en esos trades', fmt(d.pnlPerdidoPorFallos), '', 'neg') +
    '</div>' +
    '<div class="table-wrap"><table><thead>' + causasHead + '</thead><tbody>' + causasBody + '</tbody></table></div>';
}

function renderBreakdownTabla(rows, keyName){
  if(!rows || rows.length === 0) return '<div class="empty-cell">Sin datos</div>';
  var head = keyName === 'estrategia'
    ? '<tr><th>Estrategia</th><th>Total</th><th>Win%</th><th>P&L</th></tr>'
    : '<tr><th>Activo</th><th>Total</th><th>P&L</th></tr>';
  var body = rows.map(function(r){
    return keyName === 'estrategia'
      ? '<tr><td>' + r.estrategia + '</td><td class="mono">' + r.total + '</td><td class="mono">' + fmtPct(r.winrate) + '</td><td class="mono ' + (r.pnl>=0?'pos':'neg') + '">' + fmt(r.pnl) + '</td></tr>'
      : '<tr><td>' + r.activo + '</td><td class="mono">' + r.total + '</td><td class="mono ' + (r.pnl>=0?'pos':'neg') + '">' + fmt(r.pnl) + '</td></tr>';
  }).join('');
  return '<div class="table-wrap"><table><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>';
}


init();
</script>

<div id="pwa-install-bar">
  <span class="pwa-icon">📲</span>
  <div class="pwa-text"><b>Instalar Tracker Pro-Trader</b><small>Úsala como app sin navegador</small></div>
  <button class="pwa-btn" id="pwa-install-btn">Instalar</button>
  <button class="pwa-close" id="pwa-close-btn">✕</button>
</div>

<script>
(function(){
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault(); deferredPrompt = e;
    var bar = document.getElementById('pwa-install-bar'); if(bar) bar.classList.add('show');
  });
  window.addEventListener('appinstalled', function(){
    var bar = document.getElementById('pwa-install-bar'); if(bar) bar.classList.remove('show'); deferredPrompt = null;
  });
  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('pwa-install-btn');
    var close = document.getElementById('pwa-close-btn');
    var bar = document.getElementById('pwa-install-bar');
    if(btn) btn.onclick = async function(){
      if(!deferredPrompt){ return; }
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      if(bar) bar.classList.remove('show');
    };
    if(close) close.onclick = function(){ if(bar) bar.classList.remove('show'); };
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if(isIOS && !window.navigator.standalone){
      if(bar){
        bar.classList.add('show');
        var t = bar.querySelector('.pwa-text');
        if(t) t.innerHTML = '<b>Instalar en iPhone/iPad</b><small>Toca Compartir → "Añadir a inicio"</small>';
        if(btn) btn.style.display = 'none';
      }
    }
  });
})();
</script>
